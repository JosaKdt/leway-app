name: leway_app
description: "Application mobile LÉWAY — orientation post-bac au Bénin."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  go_router: ^14.6.2
  fl_chart: ^0.68.0        # 0.71 requiert Flutter 3.27+ — incompatible avec 3.19.x
  dio: ^5.9.2
  shared_preferences: ^2.2.3
  provider: ^6.1.5+1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true